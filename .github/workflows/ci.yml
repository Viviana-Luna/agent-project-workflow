name: 持续集成

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: 运行单元测试
        run: python -m unittest discover -s tests -v
      - name: 运行仓库验证
        run: python scripts/validate.py
      - name: 构建并检查 ZipApp
        run: |
          python scripts/build_release.py --output dist
          python dist/apw.pyz --version
      - name: Bootstrap 预览（macOS/Linux）
        if: runner.os != 'Windows'
        run: sh dist/install.sh --dry-run
      - name: Bootstrap 预览（Windows）
        if: runner.os == 'Windows'
        shell: pwsh
        run: pwsh dist/install.ps1 -DryRun
      - name: 校验发布资产
        shell: bash
        run: |
          cd dist
          sha256sum -c SHA256SUMS 2>/dev/null || shasum -a 256 -c SHA256SUMS
      - name: 全新 HOME Bootstrap 与诊断（macOS/Linux）
        if: runner.os != 'Windows'
        run: |
          APW_SMOKE_HOME="$RUNNER_TEMP/apw-home"
          APW_INSTALL_HOME="$APW_SMOKE_HOME" APW_BOOTSTRAP_SKIP_WIZARD=1 APW_PYZ_SOURCE="$GITHUB_WORKSPACE/dist/apw.pyz" sh dist/install.sh
          "$APW_SMOKE_HOME/.local/bin/apw" install --skills --non-interactive --yes
          "$APW_SMOKE_HOME/.local/bin/apw" install --rule codex --non-interactive --yes
          "$APW_SMOKE_HOME/.local/bin/apw" install --rule claude-code --non-interactive --yes
          "$APW_SMOKE_HOME/.local/bin/apw" install --rule kimi-code --non-interactive --yes
          "$APW_SMOKE_HOME/.local/bin/apw" install --rule opencode --non-interactive --yes
          "$APW_SMOKE_HOME/.local/bin/apw" doctor
      - name: 全新 HOME Bootstrap 与诊断（Windows）
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $smokeHome = Join-Path $env:RUNNER_TEMP "apw-home"
          $smokeVault = Join-Path $env:RUNNER_TEMP "apw-vault"
          New-Item -ItemType Directory -Force -Path $smokeVault | Out-Null
          $env:APW_INSTALL_HOME = $smokeHome
          $env:APW_BOOTSTRAP_SKIP_WIZARD = "1"
          $env:APW_PYZ_SOURCE = Join-Path $env:GITHUB_WORKSPACE "dist/apw.pyz"
          pwsh dist/install.ps1
          $apw = Join-Path $smokeHome "agent-project-workflow\bin\apw.cmd"
          & $apw install --clients codex,claude-code,kimi-code,opencode --vault-root $smokeVault --non-interactive --yes
          & $apw doctor
