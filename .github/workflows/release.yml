name: 发布稳定版本

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: 运行发布门禁
        run: |
          python3 -m unittest discover -s tests -v
          python3 scripts/validate.py
      - name: 构建发布资产
        run: |
          python3 scripts/build_release.py --version "${GITHUB_REF_NAME#v}" --output dist
          python3 dist/apw.pyz --version
      - name: 校验发布资产
        working-directory: dist
        run: sha256sum -c SHA256SUMS
      - name: 全新 HOME Bootstrap 与发布门禁
        run: |
          APW_SMOKE_HOME="$RUNNER_TEMP/apw-home"
          APW_SMOKE_VAULT="$RUNNER_TEMP/apw-vault"
          mkdir -p "$APW_SMOKE_VAULT"
          APW_INSTALL_HOME="$APW_SMOKE_HOME" APW_BOOTSTRAP_SKIP_WIZARD=1 APW_PYZ_SOURCE="$GITHUB_WORKSPACE/dist/apw.pyz" sh dist/install.sh
          "$APW_SMOKE_HOME/.local/bin/apw" install --clients codex,claude-code,kimi-code,opencode --vault-root "$APW_SMOKE_VAULT" --non-interactive --yes
          "$APW_SMOKE_HOME/.local/bin/apw" doctor
      - name: 创建 GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/apw.pyz dist/install.sh dist/release-manifest.json dist/SHA256SUMS --generate-notes --verify-tag
